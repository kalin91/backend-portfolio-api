name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      API_CREDENTIALS_JSON: ${{ secrets.API_CRED }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Check Java Version
        run: java -version

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Upload Merged Test Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: merged-test-report
          path: build/reports/tests/merged/
          retention-days: 7

      - name: Upload Karate Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports
          path: build/karate-reports/
          if-no-files-found: ignore
          retention-days: 7

